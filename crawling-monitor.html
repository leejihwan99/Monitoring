<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>크롤링 모니터링</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="stylesheet" href="css/shared.css">
<style>
  :root { --page-color: var(--accent); }
  .stats-row { grid-template-columns: repeat(5, 1fr); }
  .member-id {
    font-family: var(--mono); font-size: 14px; color: var(--accent);
    cursor: pointer; font-weight: 600; text-decoration: none; transition: color 0.15s;
  }
  .member-id:hover { color: #7fb3ff; text-decoration: underline; }
  .log-table-wrap table thead { background: var(--bg); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-dot blue"></div>
    <div>
      <div class="header-brand">저작권 통합관리 시스템</div>
      <div class="header-page">크롤링 모니터링</div>
    </div>
    <div class="header-divider"></div>
    <nav class="nav">
      <a class="nav-btn active" href="crawling-monitor.html">크롤링 모니터링</a>
      <a class="nav-btn" href="domestic-distribution.html">국내유포작품관리</a>
      <a class="nav-btn" href="work-management.html">검색작품관리</a>
      <a class="nav-btn" href="search-monitor.html">검색 모니터링</a>
    </nav>
  </div>
  <div class="sheet-badge" id="sheetBadge">● GOOGLE SHEETS</div>
</div>

<div class="main">
  <div class="stats-row">
    <div class="stat-card"><div class="stat-label">식별 회원 수</div><div class="stat-value" id="statTotal">0</div></div>
    <div class="stat-card"><div class="stat-label">신규</div><div class="stat-value accent" id="stat신규">0</div></div>
    <div class="stat-card"><div class="stat-label">모니터링</div><div class="stat-value yellow" id="stat모니터링">0</div></div>
    <div class="stat-card"><div class="stat-label">의심</div><div class="stat-value orange" id="stat의심">0</div></div>
    <div class="stat-card"><div class="stat-label">차단</div><div class="stat-value red" id="stat차단">0</div></div>
  </div>

  <div class="controls">
    <div class="search-box">
      <span class="search-icon">⌕</span>
      <input type="text" id="searchInput" placeholder="회원번호 검색..." oninput="render()">
    </div>
    <button class="filter-btn active" data-filter="전체"  onclick="setFilter(this)">전체</button>
    <button class="filter-btn" data-filter="신규"         onclick="setFilter(this)">신규</button>
    <button class="filter-btn" data-filter="모니터링"     onclick="setFilter(this)">모니터링</button>
    <button class="filter-btn" data-filter="의심"         onclick="setFilter(this)">의심</button>
    <button class="filter-btn" data-filter="차단"         onclick="setFilter(this)">차단</button>
    <button class="filter-btn" data-filter="제외"         onclick="setFilter(this)">제외</button>
    <div class="spacer"></div>
    <label class="upload-btn" for="fileInput">↑ 엑셀 업로드</label>
    <input type="file" id="fileInput" accept=".xlsx,.xls" onchange="handleFileUpload(event)">
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th onclick="sortBy('memberId')">회원번호 <span class="sort-icon">↕</span></th>
          <th onclick="sortBy('totalViews')" style="text-align:right">열람수 합계 <span class="sort-icon">↕</span></th>
          <th onclick="sortBy('detectCount')" style="text-align:right">식별횟수 <span class="sort-icon">↕</span></th>
          <th onclick="sortBy('lastDetect')">최근 식별일 <span class="sort-icon">↕</span></th>
          <th onclick="sortBy('status')">상태 <span class="sort-icon">↕</span></th>
          <th onclick="sortBy('blockedDate')">차단일 <span class="sort-icon">↕</span></th>
          <th>메모</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<!-- Log Modal -->
<div class="modal-overlay" id="logModal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">식별 로그 — <span id="modalMemberId"></span></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="log-table-wrap" style="margin-bottom:16px">
        <table>
          <thead><tr><th>회원번호</th><th style="text-align:right">열람수</th><th>날짜</th></tr></thead>
          <tbody id="modalLogBody"></tbody>
        </table>
      </div>
      <div id="modalStats"></div>
    </div>
  </div>
</div>

<!-- Status Modal -->
<div class="modal-overlay" id="statusModal" onclick="if(event.target===this)closeStatusModal()">
  <div class="status-modal">
    <h3>상태 변경 — <span id="statusModalId" style="color:var(--accent)"></span></h3>
    <div class="status-options">
      <button class="status-option" onclick="applyStatus('신규')">● 신규</button>
      <button class="status-option" onclick="applyStatus('모니터링')">● 모니터링</button>
      <button class="status-option" onclick="applyStatus('의심')">● 의심</button>
      <button class="status-option" onclick="applyStatus('차단')">● 차단</button>
      <button class="status-option" onclick="applyStatus('제외')">● 제외</button>
    </div>
    <div class="memo-input-wrap">
      <label>메모</label>
      <textarea id="memoInput" placeholder="메모를 입력하세요..."></textarea>
    </div>
    <div class="btn-row">
      <button class="btn btn-cancel" onclick="closeStatusModal()">취소</button>
      <button class="btn btn-save" onclick="saveStatusAndMemo()">저장</button>
    </div>
  </div>
</div>

<div class="upload-progress" id="uploadProgress">
  <div id="uploadMsg">처리 중...</div>
  <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
</div>
<div class="toast" id="toast"></div>

<script src="js/shared.js"></script>
<script>
let crawlingLogs    = [];
let membersMeta     = {};
let currentFilter   = '전체';
let currentSort     = { key: 'totalViews', dir: -1 };
let editingMemberId = null;

async function loadFromSheets() {
  try {
    const data = await apiGet('getAll');
    crawlingLogs = (data.logs || []).map(l => ({ ...l, date: toYMD(l.date) }));
    membersMeta  = data.meta || {};
    showToast('시트 데이터 로드 완료', 'success');
  } catch (e) { showToast('시트 연결 실패', 'error'); }
}

function computeSummary() {
  const map = {};
  for (const log of crawlingLogs) {
    const id = log.memberId, date = toYMD(log.date);
    if (!map[id]) map[id] = { memberId: id, totalViews: 0, detectCount: 0, lastDetect: '' };
    map[id].totalViews += Number(log.views) || 0;
    map[id].detectCount++;
    if (!map[id].lastDetect || date > map[id].lastDetect) map[id].lastDetect = date;
  }
  return Object.values(map).map(m => {
    const meta = membersMeta[m.memberId] || { status: '신규', blockedDate: '', memo: '' };
    if (!membersMeta[m.memberId]) membersMeta[m.memberId] = meta;
    return { ...m, ...meta };
  });
}

function render() {
  let rows = computeSummary();
  if (currentFilter !== '전체') rows = rows.filter(r => r.status === currentFilter);
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  if (q) rows = rows.filter(r => r.memberId.toLowerCase().includes(q));
  rows.sort((a, b) => {
    const av = a[currentSort.key] ?? '', bv = b[currentSort.key] ?? '';
    return (typeof av === 'number' ? av - bv : String(av).localeCompare(String(bv), 'ko')) * currentSort.dir;
  });
  const all = computeSummary();
  document.getElementById('statTotal').textContent = all.length;
  ['신규','모니터링','의심','차단'].forEach(s =>
    document.getElementById('stat'+s).textContent = all.filter(r => r.status === s).length);
  const tbody = document.getElementById('tableBody');
  if (!rows.length) { tbody.innerHTML = `<tr class="empty-row"><td colspan="7">표시할 데이터가 없습니다</td></tr>`; return; }
  tbody.innerHTML = rows.map(r => `
    <tr>
      <td><span class="member-id" onclick="openLog('${r.memberId}')">${r.memberId}</span></td>
      <td class="num">${r.totalViews.toLocaleString()}</td>
      <td class="num">${r.detectCount}</td>
      <td class="date-cell">${r.lastDetect || '—'}</td>
      <td><span class="status-badge s-${r.status}" onclick="openStatusModal('${r.memberId}')">${r.status}</span></td>
      <td class="date-cell">${r.blockedDate || '—'}</td>
      <td class="memo-cell" onclick="openStatusModal('${r.memberId}')" title="${r.memo}">${r.memo || '—'}</td>
    </tr>`).join('');
}

function openLog(memberId) {
  const logs = crawlingLogs.filter(l => l.memberId === memberId)
    .map(l => ({ ...l, date: toYMD(l.date) })).sort((a,b) => b.date.localeCompare(a.date));
  const total = logs.reduce((s, l) => s + (Number(l.views)||0), 0);
  document.getElementById('modalMemberId').textContent = memberId;
  document.getElementById('modalLogBody').innerHTML = logs.map(l => `
    <tr>
      <td style="font-family:var(--mono);font-size:14px;font-weight:600;color:var(--accent)">${l.memberId}</td>
      <td class="num">${Number(l.views).toLocaleString()}</td>
      <td class="date-cell">${l.date}</td>
    </tr>`).join('') || `<tr><td colspan="3" class="empty-msg">로그 없음</td></tr>`;
  document.getElementById('modalStats').innerHTML = `
    <div style="display:flex;gap:24px;padding:12px 4px 0;border-top:1px solid var(--border)">
      <span style="font-family:var(--mono);font-size:12px;color:var(--text2)">식별횟수 <span style="color:var(--text);font-weight:500">${logs.length}</span></span>
      <span style="font-family:var(--mono);font-size:12px;color:var(--text2)">총 열람수 <span style="color:${total>1000?'var(--red)':total>500?'var(--orange)':'var(--text)'};font-weight:500">${total.toLocaleString()}</span></span>
    </div>`;
  document.getElementById('logModal').classList.add('open');
}
function closeModal() { document.getElementById('logModal').classList.remove('open'); }

function openStatusModal(memberId) {
  editingMemberId = memberId;
  document.getElementById('statusModalId').textContent = memberId;
  document.getElementById('memoInput').value = (membersMeta[memberId]||{}).memo || '';
  document.getElementById('statusModal').classList.add('open');
}
function closeStatusModal() { document.getElementById('statusModal').classList.remove('open'); editingMemberId = null; }

function applyStatus(status) {
  if (!editingMemberId) return;
  if (!membersMeta[editingMemberId]) membersMeta[editingMemberId] = { status:'신규', blockedDate:'', memo:'' };
  membersMeta[editingMemberId].status = status;
  membersMeta[editingMemberId].blockedDate = status === '차단' ? toYMD(new Date()) : '';
  document.querySelectorAll('.status-option').forEach(b => b.style.borderColor = '');
  event.target.style.borderColor = 'var(--accent)';
}

async function saveStatusAndMemo() {
  if (!editingMemberId) return;
  if (!membersMeta[editingMemberId]) membersMeta[editingMemberId] = { status:'신규', blockedDate:'', memo:'' };
  membersMeta[editingMemberId].memo = document.getElementById('memoInput').value;
  try { await apiPost({ action:'updateMember', memberId:editingMemberId, meta:membersMeta[editingMemberId] }); showToast('저장 완료','success'); }
  catch (e) { showToast('저장 실패','error'); }
  closeStatusModal(); render();
}

function handleFileUpload(event) {
  const file = event.target.files[0]; if (!file) return; event.target.value = '';
  new FileReader().onload = e => processExcel(e.target.result);
  const fr = new FileReader(); fr.onload = e => processExcel(e.target.result); fr.readAsArrayBuffer(file);
}

async function processExcel(buffer) {
  showProgress('파일 파싱 중...', 15);
  let parsed;
  try { parsed = parseExcel(buffer, ['memberId','views','date']); }
  catch (e) { hideProgress(); showToast('파일 파싱 실패','error'); return; }
  showProgress('중복 확인 중...', 50);
  const keys = new Set(crawlingLogs.map(l => `${l.memberId}|${l.views}|${l.date}`));
  let added=0, duplicates=0, errors=0; const newLogs=[];
  for (const r of parsed) {
    const memberId=String(r.memberId||'').trim(), views=parseInt(r.views,10), date=r.date;
    if (!memberId||isNaN(views)||!date) { errors++; continue; }
    const key=`${memberId}|${views}|${date}`;
    if (keys.has(key)) { duplicates++; continue; }
    keys.add(key); newLogs.push({memberId,views,date});
    if (!membersMeta[memberId]) membersMeta[memberId]={status:'신규',blockedDate:'',memo:''};
    added++;
  }
  crawlingLogs.push(...newLogs);
  showProgress('DB 갱신 중...', 80);
  if (newLogs.length) apiPost({action:'addLogs',logs:newLogs}).catch(()=>showToast('시트 동기화 실패','error'));
  hideProgress(); render(); showUploadResult(added,duplicates,errors);
}

function setFilter(btn) {
  currentFilter = btn.dataset.filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); render();
}
function sortBy(key) {
  if (currentSort.key===key) currentSort.dir*=-1; else { currentSort.key=key; currentSort.dir=-1; }
  document.querySelectorAll('th').forEach(t=>t.classList.remove('sorted'));
  event.currentTarget.classList.add('sorted'); render();
}
document.addEventListener('keydown', e => { if(e.key==='Escape'){closeModal();closeStatusModal();} });

loadFromSheets().then(render);
</script>
</body>
</html>
